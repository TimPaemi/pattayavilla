<style>
html,body{min-height:100vh;min-height:100dvh}
body{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:2rem 1.5rem;text-align:center}
.eyebrow{display:inline-block;padding:.4rem 1rem;border:1px solid var(--red);background:rgba(230,0,48,.1);color:#ff3b5c;font-family:'JetBrains Mono','JetBrains-fallback',monospace;font-size:.62rem;letter-spacing:2.4px;text-transform:uppercase;font-weight:800;border-radius:4px;margin-bottom:2rem;animation:flicker 2.2s infinite}
@keyframes flicker{0%,100%{opacity:1}48%{opacity:.95}50%{opacity:.4}52%{opacity:1}}
@media(prefers-reduced-motion:reduce){.eyebrow{animation:none}}
h1{font-family:'Bebas Neue','Bebas-fallback',sans-serif;font-size:clamp(4.5rem,16vw,11rem);line-height:.85;letter-spacing:-.015em;font-weight:400;color:#fff;margin:0 0 1.2rem;text-transform:uppercase}
h1 .red{color:#ff3b5c;text-shadow:0 0 60px rgba(230,0,48,.55)}
.sub{font-size:1.1rem;line-height:1.55;color:var(--text);max-width:560px;margin:0 0 2rem}
.sub strong{color:var(--yellow);font-weight:700}
.actions{display:flex;flex-wrap:wrap;justify-content:center;gap:.7rem;margin-bottom:2.2rem}
.btn-pink{background:var(--pink);border-color:var(--pink);color:#08080c;box-shadow:0 0 0 4px rgba(255,47,142,.18),0 8px 30px rgba(255,47,142,.3)}
.btn-pink:hover{background:#ff4d9f;transform:translateY(-2px);color:#08080c}
.status{font-family:'JetBrains Mono','JetBrains-fallback',monospace;font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:.8rem}
.status .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);margin-right:.6rem;vertical-align:middle;animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(230,0,48,.55)}70%{opacity:.5;box-shadow:0 0 0 10px rgba(230,0,48,0)}}
@media(prefers-reduced-motion:reduce){.status .dot{animation:none}}
.brand{margin-top:auto;padding-top:3rem;font-family:'JetBrains Mono','JetBrains-fallback',monospace;font-size:.6rem;letter-spacing:1.6px;text-transform:uppercase;color:var(--dim);font-weight:700}
.brand .pink{color:var(--pink)}
.brand a{color:var(--muted);text-decoration:none}
.brand a:hover{color:var(--cyan)}
@media(max-width:540px){.btn{padding:.85rem 1.3rem;font-size:.7rem;letter-spacing:1.6px}}
</style>
</head>
<body>

<div class="slash-bg" aria-hidden="true"></div>

<div class="status" id="net-status" aria-live="polite">
  <span class="dot" aria-hidden="true"></span>
  <span id="net-status-text">OFFLINE · NO CONNECTION</span>
</div>

<span class="eyebrow">// CONNECTION LOST</span>

<h1>NO<br><span class="red">SIGNAL.</span></h1>

<p class="sub">
  <strong>You're offline.</strong>
  The villa show is live every night at 9 PM ICT — but right now your device can't reach us.
  Check your connection and try again.
</p>

<div class="actions">
  <button type="button" class="btn btn-pink" onclick="location.reload()">↻ RETRY</button>
  <a href="/" class="btn btn-cyan">← BACK HOME</a>
</div>

<div class="brand">
  PATTAYA VILLA <span class="pink">STREAM.</span> · TIM &amp; PAEMI · <a href="/">pattayastream.com</a>
</div>

<script>
/* If the connection comes back, show a "back online" hint so user can reload */
(function(){
  function tick(){
    var s=document.getElementById('net-status-text');
    if(!s)return;
    if(navigator.onLine){
      s.textContent='BACK ONLINE · TAP RETRY';
      document.querySelector('.status .dot').style.background='#6aff9f';
    }else{
      s.textContent='OFFLINE · NO CONNECTION';
    }
  }
  window.addEventListener('online',tick,{passive:true});
  window.addEventListener('offline',tick,{passive:true});
  tick();
})();
</script>

</body>
