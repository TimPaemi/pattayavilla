<script>
/* If the connection comes back, show a "back online" hint so user can reload */
(function(){
  function tick(){
    var s=document.getElementById('net-status-text');
    if(!s)return;
    if(navigator.onLine){
      s.textContent='BACK ONLINE · TAP RETRY';
      document.querySelector('.offline-status .dot').style.background='#6aff9f';
    }else{
      s.textContent='OFFLINE · NO CONNECTION';
    }
  }
  window.addEventListener('online',tick,{passive:true});
  window.addEventListener('offline',tick,{passive:true});
  tick();
})();
</script>
