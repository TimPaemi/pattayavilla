# PATTAYA VILLA · Lighthouse CI
# Full-site desktop Lighthouse on every push (indexed + noindex utility pages).
name: Lighthouse CI

on:
  deployment_status:
  push:
    branches: [master, main]

jobs:
  lighthouse:
    if: github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success' && github.event.deployment_status.environment_url != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for deploy to be reachable
        run: sleep 10

      - name: Run Lighthouse (indexed pages)
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            ${{ github.event.deployment_status.environment_url }}
            ${{ github.event.deployment_status.environment_url }}/about/
            ${{ github.event.deployment_status.environment_url }}/support/
            ${{ github.event.deployment_status.environment_url }}/format/
            ${{ github.event.deployment_status.environment_url }}/code/
            ${{ github.event.deployment_status.environment_url }}/faq/
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: '.github/workflows/lighthouserc.json'
          artifactName: lighthouse-indexed

      - name: Run Lighthouse (noindex utility pages)
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            ${{ github.event.deployment_status.environment_url }}/community/
            ${{ github.event.deployment_status.environment_url }}/offline/
            ${{ github.event.deployment_status.environment_url }}/404/
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: '.github/workflows/lighthouserc-noindex.json'
          artifactName: lighthouse-noindex

      - name: Summary
        if: always()
        run: |
          echo '## Lighthouse scores' >> $GITHUB_STEP_SUMMARY
          echo 'Indexed pages: perf ≥90 · a11y ≥96 · SEO ≥95. Utility pages (noindex): perf ≥90 · a11y ≥96.' >> $GITHUB_STEP_SUMMARY

  lighthouse-production:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Cloudflare Pages deploy
        run: sleep 45

      - name: Run Lighthouse on production (indexed)
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://pattayastream.com/
            https://pattayastream.com/about/
            https://pattayastream.com/support/
            https://pattayastream.com/format/
            https://pattayastream.com/code/
            https://pattayastream.com/faq/
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: '.github/workflows/lighthouserc.json'
          artifactName: lighthouse-indexed

      - name: Run Lighthouse on production (noindex utility)
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://pattayastream.com/community/
            https://pattayastream.com/offline/
            https://pattayastream.com/404/
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: '.github/workflows/lighthouserc-noindex.json'
          artifactName: lighthouse-noindex
