# Auto-submit sitemap to Google Search Console + Bing Webmaster when secrets are set
name: Search engine sitemap submit

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  search-submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install GSC dependencies
        run: pip install -r scripts/requirements-gsc.txt

      - name: Submit sitemap to Google Search Console
        env:
          GSC_KEY: ${{ secrets.GSC_KEY }}
        run: python3 scripts/gsc_submit.py

      - name: Submit sitemap to Bing Webmaster
        env:
          BING_WEBMASTER_API_KEY: ${{ secrets.BING_WEBMASTER_API_KEY }}
        run: python3 scripts/bing_submit.py

      - name: Summary
        env:
          GSC_KEY: ${{ secrets.GSC_KEY }}
          BING_WEBMASTER_API_KEY: ${{ secrets.BING_WEBMASTER_API_KEY }}
        run: |
          if [ -z "$GSC_KEY" ]; then
            echo '## GSC: skipped (GSC_KEY not set)' >> $GITHUB_STEP_SUMMARY
          else
            echo '## GSC: sitemap submit attempted' >> $GITHUB_STEP_SUMMARY
          fi
          if [ -z "$BING_WEBMASTER_API_KEY" ]; then
            echo '## Bing: skipped (BING_WEBMASTER_API_KEY not set)' >> $GITHUB_STEP_SUMMARY
          else
            echo '## Bing: sitemap submit attempted' >> $GITHUB_STEP_SUMMARY
          fi
