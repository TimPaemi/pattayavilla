# PATTAYA VILLA · Pre-flight validation
# Runs on every push and PR. Verifies HTML/JSON integrity + schema validity
# BEFORE Cloudflare Pages picks up the commit.
name: Pre-flight validation

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HTML integrity check
        run: |
          set -e
          fail=0
          for f in $(find . -name "*.html" -not -path "./.git/*" -not -path "./.deploy-stage/*" -not -path "./_pattayavilla-scaffold/*"); do
            if ! grep -q "</html>" "$f"; then
              echo "::error file=$f::missing </html>"
              fail=1
            fi
            if ! grep -q "</body>" "$f"; then
              echo "::error file=$f::missing </body>"
              fail=1
            fi
            if ! grep -q "^<!DOCTYPE html>" "$f"; then
              echo "::error file=$f::missing <!DOCTYPE html> on first line"
              fail=1
            fi
          done
          if [ $fail -eq 1 ]; then
            echo "::error::HTML integrity check failed"
            exit 1
          fi
          echo "HTML integrity: PASS"

      - name: JSON validation
        run: |
          set -e
          python3 -c "
          import json, sys
          ok = True
          for f in ['manifest.json', '.well-known/security.txt']:
              if f.endswith('.json'):
                  try:
                      json.load(open(f))
                      print(f'  OK: {f}')
                  except Exception as e:
                      print(f'::error file={f}::{e}')
                      ok = False
          if not ok: sys.exit(1)
          print('JSON validation: PASS')
          "

      - name: JSON-LD schema validation
        run: |
          set -e
          python3 -c "
          import json, re, sys, glob
          ok = True
          for f in glob.glob('**/*.html', recursive=True):
              if '_pattayavilla-scaffold' in f: continue
              html = open(f).read()
              for i, b in enumerate(re.findall(r'<script type=\"application/ld\+json\">\s*(.*?)\s*</script>', html, re.DOTALL)):
                  try:
                      json.loads(b)
                  except Exception as e:
                      print(f'::error file={f}::JSON-LD block {i} fails to parse: {e}')
                      ok = False
          if not ok: sys.exit(1)
          print('JSON-LD validation: PASS')
          "

      - name: No crypto / no stray handles check
        run: |
          set -e
          # Crypto must be absent (operator does not use crypto)
          if grep -rni '\b\(crypto\|bitcoin\|wallet\)\b' --include="*.html" --exclude-dir=.git --exclude-dir=_pattayavilla-scaffold . | grep -v "node_modules"; then
            echo "::error::Crypto reference found — operator policy: no crypto on this site"
            exit 1
          fi
          echo "Anonymization + crypto policy: PASS"

      - name: Internal link health
        run: |
          set -e
          python3 -c "
          import re, glob, sys
          known = {'/','/support/','/community/','/format/','/code/','/faq/','/404','/offline',
                   '/manifest.json','/favicon.svg','/favicon.ico','/apple-touch-icon.png',
                   '/sw.js','/sitemap.xml','/robots.txt'}
          anchors = {'#main','#top','#hero','#tip-tonight','#free','#why-heading','#welcome-heading',
                     '#banned-heading','#scale-heading','#explore-heading','#contact','#become-a-regular',
                     '#become-heading','#typical-night','#the-crew','#chat-is-the-room','#the-vibe'}
          broken = []
          for f in glob.glob('**/*.html', recursive=True):
              if '_pattayavilla-scaffold' in f: continue
              html = open(f).read()
              for h in re.findall(r'href=\"(/[^\"]*)\"', html):
                  base = h.split('#')[0].split('?')[0]
                  if base in known: continue
                  if base.startswith('/assets/'): continue
                  broken.append((f, h))
              for h in re.findall(r'href=\"(#[^\"]+)\"', html):
                  if h not in anchors:
                      broken.append((f, h))
          if broken:
              for f, h in broken[:20]:
                  print(f'::warning file={f}::potentially broken link: {h}')
          else:
              print('Internal links: PASS')
          "

      - name: Summary
        run: |
          echo '## Pre-flight: ALL CHECKS PASSED' >> $GITHUB_STEP_SUMMARY
          echo 'HTML closing tags, JSON syntax, JSON-LD schemas, crypto policy, anonymization, and internal links all OK.' >> $GITHUB_STEP_SUMMARY
